<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Library</title>
</head>
<body>
    <div id="container">
        <div id="form-container">
            <h1>Add Book to Reading List</h1>
            <form action="" id="form">
                <div class="input-box">
                    <!-- <label for="title">Title</label> -->
                    <input type="text" name="title" id="title" placeholder="Title">
                </div>
 
               <div class="input-box">
                    <!-- <label for="author">Author</label> -->
                    <input type="text" name="author" placeholder="Author" id="author">
                </div> 

                <div class="input-box">
                    <!-- <label for="pages">Page Count</label> -->
                    <input type="number"  placeholder="Page Count"name="pages" id="pages">
                </div>

                <div class="input-box" id="read-box">
                    <label for="read">Read?</label>
                    <input type="checkbox" name="read" id="read">
                </div>
               
                <div id="submit-container">  <button id="submit" type="submit">Add</button></div>
              
    
            </form>
        </div>
        

        <div id="deck">
            

        </div>

    </div>

    
</body>
</html>
